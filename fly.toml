# fly.toml — generated for dallas-crime-analysis backend
# Update `app` to match the name you chose during `fly launch`
app = "dallas-crime-api"
primary_region = "dfw"

[build]

[mounts]
  source = "data"
  destination = "/data"

[env]
  DATABASE_URL = "/data/crime_analysis.db"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
